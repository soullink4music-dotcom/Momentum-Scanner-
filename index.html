<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Momentum Sniper Terminal</title>

<style>
body {
  font-family: sans-serif;
  background: #0a0a0a;
  color: white;
  padding: 15px;
}
h1 { color: #00ff9f; }

.card {
  background: #1a1a1a;
  padding: 15px;
  margin-top: 15px;
  border-radius: 10px;
}

.item {
  background: #222;
  padding: 10px;
  margin-top: 10px;
  border-radius: 5px;
}

button {
  margin-top: 5px;
  padding: 6px;
  background: #00ff9f;
  border: none;
  border-radius: 5px;
  font-weight: bold;
}

.green { color: #00ff9f; }
.red { color: #ff4d4d; }
.yellow { color: #ffd700; }
</style>
</head>

<body>

<h1>🚀 Sniper Terminal</h1>

<div class="card">
<h3>🔥 Trending</h3>
<div id="trending"></div>
</div>

<div class="card">
<h3>🐋 Whale Gems</h3>
<div id="whales"></div>
</div>

<div class="card">
<h3>🚨 Early Volume Spikes</h3>
<div id="spikes"></div>
</div>

<script>
// 🔊 ALERT SOUND
function playAlert() {
  let audio = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
  audio.play();
}

// 🔔 ALERT POPUP
function sendAlert(msg) {
  alert(msg);
  playAlert();
}

// 🛑 ANTI-RUG FILTER
function isSafe(p) {
  return (
    p.liquidity?.usd > 50000 &&         // enough liquidity
    p.volume?.h24 > 50000 &&            // real activity
    p.txns?.h24?.buys > 20 &&           // not dead
    p.txns?.h24?.sells > 5 &&           // not fake
    p.priceUsd > 0.000000001            // avoid dust scams
  );
}

// 📡 FETCH DATA
async function fetchData() {
  const queries = ["eth","bnb","sol","pepe","doge"];
  let all = [];

  for (let q of queries) {
    let res = await fetch(`https://api.dexscreener.com/latest/dex/search?q=${q}`);
    let data = await res.json();
    if (data.pairs) all = all.concat(data.pairs);
  }

  return all;
}

// 💰 BUY LINK
function buyLink(p) {
  return `https://dexscreener.com/${p.chainId}/${p.pairAddress}`;
}

// 🔥 TRENDING
async function fetchTrending() {
  let pairs = await fetchData();
  let seen = new Set();

  let list = pairs
    .filter(p => isSafe(p))
    .filter(p => p.priceChange?.h24 > 10)
    .filter(p => {
      let s = p.baseToken.symbol;
      if (seen.has(s)) return false;
      seen.add(s);
      return true;
    })
    .sort((a,b)=>b.priceChange.h24-a.priceChange.h24)
    .slice(0,8);

  document.getElementById("trending").innerHTML =
    list.map(p=>`
    <div class="item">
      <b>${p.baseToken.symbol}</b><br>
      $${p.priceUsd}<br>
      <span class="green">${p.priceChange.h24.toFixed(1)}%</span><br>
      <button onclick="window.open('${buyLink(p)}')">💰 View</button>
    </div>
    `).join("");
}

// 🐋 WHALES
async function fetchWhales() {
  let pairs = await fetchData();
  let seen = new Set();

  let whales = pairs
    .filter(p => isSafe(p))
    .filter(p =>
      p.volume.h24 > 100000 &&
      Math.abs(p.priceChange.h24) < 20 &&
      p.txns.h24.buys > p.txns.h24.sells
    )
    .filter(p=>{
      let s=p.baseToken.symbol;
      if(seen.has(s)) return false;
      seen.add(s);
      return true;
    })
    .slice(0,8);

  document.getElementById("whales").innerHTML =
    whales.map(p=>`
    <div class="item">
      <b>${p.baseToken.symbol}</b><br>
      Vol: $${Math.round(p.volume.h24)}<br>
      <span class="yellow">🐋 Accumulating</span><br>
      <button onclick="window.open('${buyLink(p)}')">💰 View</button>
    </div>
    `).join("");
}

// 🚨 SPIKES + ALERT
let alerted = new Set();

async function fetchSpikes() {
  let pairs = await fetchData();
  let seen = new Set();

  let spikes = pairs
    .filter(p => isSafe(p))
    .filter(p =>
      p.volume.h24 > 150000 &&
      Math.abs(p.priceChange.h24) < 8 &&
      p.txns.h24.buys > p.txns.h24.sells
    )
    .filter(p=>{
      let s=p.baseToken.symbol;
      if(seen.has(s)) return false;
      seen.add(s);
      return true;
    })
    .slice(0,6);

  spikes.forEach(p=>{
    if (!alerted.has(p.baseToken.symbol)) {
      sendAlert(`🚨 EARLY GEM: ${p.baseToken.symbol}`);
      alerted.add(p.baseToken.symbol);
    }
  });

  document.getElementById("spikes").innerHTML =
    spikes.map(p=>`
    <div class="item">
      <b>${p.baseToken.symbol}</b><br>
      Vol: $${Math.round(p.volume.h24)}<br>
      Change: ${p.priceChange.h24.toFixed(2)}%<br>
      <span class="green">EARLY ENTRY</span><br>
      <button onclick="window.open('${buyLink(p)}')">💰 View</button>
    </div>
    `).join("");
}

// AUTO LOOP
setInterval(()=>{
  fetchTrending();
  fetchWhales();
  fetchSpikes();
},20000);

// INIT
fetchTrending();
fetchWhales();
fetchSpikes();
</script>

</body>
</html>
