
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Momentum Scanner Pro</title>

<style>
body {
  font-family: sans-serif;
  background: #0a0a0a;
  color: white;
  padding: 15px;
}
h1 {
  color: #00ff9f;
}
.card {
  background: #1a1a1a;
  padding: 15px;
  margin-top: 15px;
  border-radius: 10px;
}
input, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  background: #222;
  border: none;
  color: white;
  border-radius: 5px;
}
button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  background: #00ff9f;
  border: none;
  border-radius: 5px;
  font-weight: bold;
}
.item {
  background: #222;
  padding: 10px;
  margin-top: 10px;
  border-radius: 5px;
}
</style>
</head>

<body>

<h1>🚀 Momentum Scanner Pro</h1>

<div class="card">
<h3>📝 Log Signal</h3>
<input id="ticker" placeholder="Ticker">
<input id="ca" placeholder="Contract Address">
<textarea id="note" placeholder="Notes"></textarea>
<button onclick="logSignal()">Log</button>
</div>

<div class="card">
<h3>📋 Signals</h3>
<div id="signals"></div>
</div>

<div class="card">
<h3>⭐ Watchlist</h3>
<input id="wticker" placeholder="Ticker">
<input id="wca" placeholder="CA">
<input id="hype" placeholder="Hype 1-10">
<button onclick="addWatch()">Add</button>
<div id="watchlist"></div>
</div>

<script>
// LOAD DATA
let signals = JSON.parse(localStorage.getItem("signals") || "[]");
let watchlist = JSON.parse(localStorage.getItem("watchlist") || "[]");

// DISPLAY FUNCTIONS
function renderSignals() {
  const box = document.getElementById("signals");
  box.innerHTML = "";
  signals.forEach(s => {
    box.innerHTML += `
      <div class="item">
        <b>${s.ticker}</b><br>
        ${s.ca}<br>
        ${s.note}
      </div>
    `;
  });
}

function renderWatch() {
  const box = document.getElementById("watchlist");
  box.innerHTML = "";
  watchlist.forEach(w => {
    box.innerHTML += `
      <div class="item">
        <b>${w.ticker}</b> (Hype: ${w.hype})<br>
        ${w.ca}
      </div>
    `;
  });
}

// ACTIONS
function logSignal() {
  const ticker = document.getElementById("ticker").value;
  const ca = document.getElementById("ca").value;
  const note = document.getElementById("note").value;

  if (!ticker) return alert("Enter ticker");

  signals.push({ ticker, ca, note });
  localStorage.setItem("signals", JSON.stringify(signals));

  renderSignals();
}

function addWatch() {
  const ticker = document.getElementById("wticker").value;
  const ca = document.getElementById("wca").value;
  const hype = document.getElementById("hype").value;

  if (!ticker) return alert("Enter ticker");

  watchlist.push({ ticker, ca, hype });
  localStorage.setItem("watchlist", JSON.stringify(watchlist));

  renderWatch();
}

// INITIAL LOAD
renderSignals();
renderWatch();

// SERVICE WORKER (YOUR FIX)
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js")
      .then(() => console.log("✅ Service Worker Registered"))
      .catch(err => console.error("❌ SW failed:", err));
  });
}
</script>

</body>
</html>
