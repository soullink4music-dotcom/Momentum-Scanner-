<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Momentum Scanner Pro</title>

<style>
body {
  font-family: sans-serif;
  background: #0a0a0a;
  color: white;
  padding: 15px;
}
h1 { color: #00ff9f; }
.card {
  background: #1a1a1a;
  padding: 15px;
  margin-top: 15px;
  border-radius: 10px;
}
input, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  background: #222;
  border: none;
  color: white;
  border-radius: 5px;
}
button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  background: #00ff9f;
  border: none;
  border-radius: 5px;
  font-weight: bold;
}
.item {
  background: #222;
  padding: 10px;
  margin-top: 10px;
  border-radius: 5px;
}
.green { color: #00ff9f; }
.red { color: #ff4d4d; }
.yellow { color: #ffd700; }
</style>
</head>

<body>

<h1>🚀 Momentum Scanner Pro</h1>

<!-- SIGNAL -->
<div class="card">
<h3>📝 Log Signal</h3>
<input id="ticker" placeholder="Ticker">
<input id="ca" placeholder="Contract Address">
<textarea id="note" placeholder="Notes"></textarea>
<button onclick="logSignal()">Log</button>
</div>

<div class="card">
<h3>📋 Signals</h3>
<div id="signals"></div>
</div>

<!-- WATCHLIST -->
<div class="card">
<h3>⭐ Watchlist</h3>
<input id="wticker" placeholder="Ticker">
<input id="wca" placeholder="CA">
<input id="hype" placeholder="Hype 1-10">
<button onclick="addWatch()">Add</button>
<div id="watchlist"></div>
</div>

<!-- TRENDING -->
<div class="card">
<h3>🔥 Trending</h3>
<div id="trending"></div>
</div>

<!-- 🐋 WHALE + EARLY -->
<div class="card">
<h3>🐋 Whale Activity + Early Pumps</h3>
<div id="whales"></div>
</div>

<script>
let signals = JSON.parse(localStorage.getItem("signals") || "[]");
let watchlist = JSON.parse(localStorage.getItem("watchlist") || "[]");

// FETCH DATA
async function fetchData(q="sol") {
  const res = await fetch(`https://api.dexscreener.com/latest/dex/search?q=${q}`);
  const data = await res.json();
  return data.pairs || [];
}

// SIGNALS
async function renderSignals() {
  const box = document.getElementById("signals");
  let html = "";

  for (let s of signals) {
    let pairs = await fetchData(s.ticker);
    let p = pairs[0];

    if (!p) continue;

    let change = p.priceChange.h24;
    let signal = change > 20 ? "🚀 STRONG BUY" :
                 change > 5 ? "📈 MOMENTUM" :
                 "⚠️ WEAK";

    html += `
    <div class="item">
      <b>${s.ticker}</b><br>
      Price: $${p.priceUsd}<br>
      <span class="${change>0?'green':'red'}">${change}%</span><br>
      ${signal}
    </div>`;
  }

  box.innerHTML = html || "No signals";
}

// WATCHLIST
async function renderWatch() {
  const box = document.getElementById("watchlist");
  let html = "";

  for (let w of watchlist) {
    let pairs = await fetchData(w.ticker);
    let p = pairs[0];
    if (!p) continue;

    html += `
    <div class="item">
      <b>${w.ticker}</b> (Hype ${w.hype})<br>
      $${p.priceUsd}<br>
      <span class="${p.priceChange.h24>0?'green':'red'}">
      ${p.priceChange.h24}%
      </span>
    </div>`;
  }

  box.innerHTML = html || "Empty";
}

// 🔥 TRENDING
async function fetchTrending() {
  const box = document.getElementById("trending");
  let pairs = await fetchData();

  let list = pairs
    .filter(p => p.priceChange.h24 > 10)
    .sort((a,b)=>b.priceChange.h24-a.priceChange.h24)
    .slice(0,10);

  let html = list.map(p=>`
    <div class="item">
      <b>${p.baseToken.symbol}</b><br>
      $${p.priceUsd}<br>
      <span class="green">${p.priceChange.h24}%</span>
    </div>`).join("");

  box.innerHTML = html || "No trends";
}

// 🐋 WHALE + EARLY DETECTION
async function fetchWhales() {
  const box = document.getElementById("whales");
  box.innerHTML = "Scanning smart money...";

  let pairs = await fetchData();

  let whales = pairs.filter(p =>
    p.liquidity.usd > 50000 && // real money
    p.volume.h24 > 100000 &&  // strong activity
    p.priceChange.h24 < 15    // NOT pumped yet
  ).slice(0,10);

  let html = "";

  whales.forEach(p => {
    let tag = "🐋 ACCUMULATION";
    if (p.volume.h24 > 500000) tag = "🚨 EARLY GEM";

    html += `
    <div class="item">
      <b>${p.baseToken.symbol}</b><br>
      Price: $${p.priceUsd}<br>
      Vol: $${Math.round(p.volume.h24)}<br>
      Liquidity: $${Math.round(p.liquidity.usd)}<br>
      <span class="yellow">${tag}</span>
    </div>`;
  });

  box.innerHTML = html || "No whale activity";
}

// ACTIONS
function logSignal() {
  let t = ticker.value;
  if (!t) return alert("Enter ticker");
  signals.push({ticker:t});
  localStorage.setItem("signals", JSON.stringify(signals));
  renderSignals();
}

function addWatch() {
  let t = wticker.value;
  let h = hype.value;
  if (!t) return alert("Enter ticker");
  watchlist.push({ticker:t, hype:h});
  localStorage.setItem("watchlist", JSON.stringify(watchlist));
  renderWatch();
}

// AUTO REFRESH
setInterval(()=>{
  renderSignals();
  renderWatch();
  fetchTrending();
  fetchWhales();
},20000);

// INIT
renderSignals();
renderWatch();
fetchTrending();
fetchWhales();

// SERVICE WORKER
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js");
  });
}
</script>

</body>
</html>
