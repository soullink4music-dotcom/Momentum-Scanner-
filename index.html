<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Momentum Scanner Pro</title>

<style>
body {
  font-family: sans-serif;
  background: #0a0a0a;
  color: white;
  padding: 15px;
}
h1 { color: #00ff9f; }
.card {
  background: #1a1a1a;
  padding: 15px;
  margin-top: 15px;
  border-radius: 10px;
}
input, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  background: #222;
  border: none;
  color: white;
  border-radius: 5px;
}
button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  background: #00ff9f;
  border: none;
  border-radius: 5px;
  font-weight: bold;
}
.item {
  background: #222;
  padding: 10px;
  margin-top: 10px;
  border-radius: 5px;
}
.green { color: #00ff9f; }
.red { color: #ff4d4d; }
</style>
</head>

<body>

<h1>🚀 Momentum Scanner Pro</h1>

<!-- LOG SIGNAL -->
<div class="card">
<h3>📝 Log Signal</h3>
<input id="ticker" placeholder="Ticker">
<input id="ca" placeholder="Contract Address">
<textarea id="note" placeholder="Notes"></textarea>
<button onclick="logSignal()">Log</button>
</div>

<!-- SIGNALS -->
<div class="card">
<h3>📋 Signals</h3>
<div id="signals"></div>
</div>

<!-- WATCHLIST -->
<div class="card">
<h3>⭐ Watchlist</h3>
<input id="wticker" placeholder="Ticker">
<input id="wca" placeholder="CA">
<input id="hype" placeholder="Hype 1-10">
<button onclick="addWatch()">Add</button>
<div id="watchlist"></div>
</div>

<!-- TRENDING -->
<div class="card">
<h3>🔥 Auto Trending Tokens</h3>
<div id="trending"></div>
</div>

<script>
let signals = JSON.parse(localStorage.getItem("signals") || "[]");
let watchlist = JSON.parse(localStorage.getItem("watchlist") || "[]");

// FETCH TOKEN DATA
async function fetchTokenData(query) {
  try {
    const res = await fetch(`https://api.dexscreener.com/latest/dex/search?q=${query}`);
    const data = await res.json();
    return data.pairs ? data.pairs[0] : null;
  } catch {
    return null;
  }
}

// RENDER SIGNALS
async function renderSignals() {
  const box = document.getElementById("signals");
  box.innerHTML = "Loading...";

  let html = "";

  for (let s of signals) {
    let pair = await fetchTokenData(s.ticker || s.ca);

    let price = pair ? pair.priceUsd : "N/A";
    let change = pair ? pair.priceChange.h24 : "0";

    let color = change >= 0 ? "green" : "red";
    let signal = change > 20 ? "🚀 STRONG BUY" :
                 change > 5 ? "📈 MOMENTUM" :
                 "⚠️ WEAK";

    html += `
      <div class="item">
        <b>${s.ticker}</b><br>
        Price: $${price}<br>
        <span class="${color}">24h: ${change}%</span><br>
        Signal: ${signal}<br>
        ${s.note}
      </div>
    `;
  }

  box.innerHTML = html || "No signals yet";
}

// RENDER WATCHLIST
async function renderWatch() {
  const box = document.getElementById("watchlist");
  box.innerHTML = "Loading...";

  let html = "";

  for (let w of watchlist) {
    let pair = await fetchTokenData(w.ticker || w.ca);

    let price = pair ? pair.priceUsd : "N/A";
    let change = pair ? pair.priceChange.h24 : "0";

    let color = change >= 0 ? "green" : "red";

    html += `
      <div class="item">
        <b>${w.ticker}</b> (Hype: ${w.hype})<br>
        Price: $${price}<br>
        <span class="${color}">${change}%</span>
      </div>
    `;
  }

  box.innerHTML = html || "Empty watchlist";
}

// 🔥 TRENDING TOKENS
async function fetchTrending() {
  const box = document.getElementById("trending");
  box.innerHTML = "Scanning market...";

  try {
    const res = await fetch("https://api.dexscreener.com/latest/dex/search?q=sol");
    const data = await res.json();

    let pairs = data.pairs || [];

    let trending = pairs
      .filter(p => p.priceChange.h24 > 10)
      .sort((a, b) => b.priceChange.h24 - a.priceChange.h24)
      .slice(0, 10);

    let html = "";

    trending.forEach(p => {
      let change = p.priceChange.h24;

      let signal = change > 30 ? "🚀 PARABOLIC" :
                   change > 15 ? "🔥 HOT" :
                   "📈 TRENDING";

      html += `
        <div class="item">
          <b>${p.baseToken.symbol}</b><br>
          Price: $${p.priceUsd}<br>
          <span class="green">${change}%</span><br>
          ${signal}
        </div>
      `;
    });

    box.innerHTML = html || "No strong trends found";

  } catch {
    box.innerHTML = "Error loading data";
  }
}

// ACTIONS
function logSignal() {
  const ticker = document.getElementById("ticker").value;
  const ca = document.getElementById("ca").value;
  const note = document.getElementById("note").value;

  if (!ticker) return alert("Enter ticker");

  signals.push({ ticker, ca, note });
  localStorage.setItem("signals", JSON.stringify(signals));

  renderSignals();
}

function addWatch() {
  const ticker = document.getElementById("wticker").value;
  const ca = document.getElementById("wca").value;
  const hype = document.getElementById("hype").value;

  if (!ticker) return alert("Enter ticker");

  watchlist.push({ ticker, ca, hype });
  localStorage.setItem("watchlist", JSON.stringify(watchlist));

  renderWatch();
}

// AUTO REFRESH
setInterval(() => {
  renderSignals();
  renderWatch();
  fetchTrending();
}, 20000);

// INITIAL LOAD
renderSignals();
renderWatch();
fetchTrending();

// SERVICE WORKER
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js")
      .then(() => console.log("✅ Service Worker Registered"))
      .catch(err => console.error("❌ SW failed:", err));
  });
}
</script>

</body>
</html>
