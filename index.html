<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sniper Terminal</title>

<style>
body {
  background:#0f0f0f;
  color:white;
  font-family:sans-serif;
  padding:10px;
}
h1 { text-align:center; color:#19f5b3; }

.card {
  background:#1c1c1c;
  padding:15px;
  border-radius:15px;
  margin-bottom:15px;
}

.item {
  background:#2a2a2a;
  padding:12px;
  border-radius:10px;
  margin-top:10px;
}

button {
  background:#19f5b3;
  border:none;
  padding:8px 12px;
  border-radius:8px;
  margin-top:8px;
  cursor:pointer;
}

.red { color:#ff4d4d }
.green { color:#00ffae }
.yellow { color:#ffd700 }
</style>
</head>

<body>

<h1>🚀 Sniper Terminal</h1>

<div class="card">
<h3>🔥 Trending</h3>
<div id="trending">Loading...</div>
</div>

<div class="card">
<h3>🐋 Whale Gems</h3>
<div id="whales">Loading...</div>
</div>

<div class="card">
<h3>🚨 Early Volume Spikes</h3>
<div id="spikes">Loading...</div>
</div>

<audio id="alertSound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>

// ✅ SERVICE WORKER SAFE REGISTER
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(()=>{});
  });
}

// ==========================
// 🔥 FETCH DATA (FIXED)
// ==========================
async function fetchData(){
  try {
    let res = await fetch("https://api.dexscreener.com/latest/dex/pairs/ethereum");
    let data = await res.json();
    return data.pairs || [];
  } catch (e){
    console.log("API error", e);
    return [];
  }
}

// ==========================
// 🔔 ALERT
// ==========================
function triggerAlert(){
  let audio = document.getElementById("alertSound");
  audio.play().catch(()=>{});
  if (navigator.vibrate) navigator.vibrate(200);
}

// ==========================
// 🛑 SAFE FILTER
// ==========================
function isSafe(p){
  return (
    p.liquidity?.usd > 20000 &&
    p.volume?.h24 > 30000 &&
    p.txns?.h24?.buys > p.txns?.h24?.sells
  );
}

// ==========================
// 🔗 LINK
// ==========================
function dexLink(p){
  return `https://dexscreener.com/${p.chainId}/${p.pairAddress}`;
}

// ==========================
// 🔥 TRENDING
// ==========================
async function fetchTrending(){
  let box = document.getElementById("trending");
  let pairs = await fetchData();

  if(!pairs.length){
    box.innerHTML = "⚠️ No data";
    return;
  }

  let list = pairs.filter(p =>
    p.volume?.h24 > 150000 &&
    p.priceChange?.h24 > 3 &&
    isSafe(p)
  ).slice(0,5);

  box.innerHTML = list.map(p=>`
    <div class="item">
      <b>${p.baseToken.symbol}</b><br>
      Vol: $${Math.round(p.volume.h24)}<br>
      Change: ${p.priceChange.h24.toFixed(2)}%<br>
      <button onclick="window.open('${dexLink(p)}')">💰 Buy</button>
    </div>
  `).join("") || "No trending";
}

// ==========================
// 🐋 WHALES
// ==========================
async function fetchWhales(){
  let box = document.getElementById("whales");
  let pairs = await fetchData();

  let list = pairs.filter(p =>
    p.volume?.h24 > 400000 &&
    Math.abs(p.priceChange?.h24 || 0) < 8 &&
    isSafe(p)
  ).slice(0,5);

  box.innerHTML = list.map(p=>`
    <div class="item">
      <b>${p.baseToken.symbol}</b><br>
      Vol: $${Math.round(p.volume.h24)}<br>
      <span class="yellow">🐋 Accumulating</span><br>
      <button onclick="window.open('${dexLink(p)}')">View</button>
    </div>
  `).join("") || "No whales";
}

// ==========================
// 🚨 SPIKES
// ==========================
let seen = new Set();

async function fetchSpikes(){
  let box = document.getElementById("spikes");
  let pairs = await fetchData();

  let list = pairs.filter(p =>
    p.volume?.h24 > 120000 &&
    Math.abs(p.priceChange?.h24 || 0) < 6 &&
    p.txns?.h24?.buys > p.txns?.h24?.sells &&
    isSafe(p)
  ).slice(0,6);

  list.forEach(p=>{
    if(!seen.has(p.pairAddress)){
      triggerAlert();
      seen.add(p.pairAddress);
    }
  });

  box.innerHTML = list.map(p=>{
    let pressure = p.txns.h24.buys - p.txns.h24.sells;

    let tag =
      pressure > 200 ? "🚨 HEAVY" :
      pressure > 100 ? "🔥 BUILDING" :
      "👀 EARLY";

    return `
    <div class="item">
      <b>${p.baseToken.symbol}</b><br>
      Vol: $${Math.round(p.volume.h24)}<br>
      Change: ${p.priceChange.h24.toFixed(2)}%<br>
      <span class="green">${tag}</span><br>
      <button onclick="window.open('${dexLink(p)}')">💰 Buy</button>
    </div>
    `;
  }).join("") || "No spikes";
}

// ==========================
// 🚀 INIT
// ==========================
async function init(){
  await fetchTrending();
  await fetchWhales();
  await fetchSpikes();
}

init();

setInterval(()=>{
  fetchTrending();
  fetchWhales();
  fetchSpikes();
},20000);

</script>

</body>
</html>
