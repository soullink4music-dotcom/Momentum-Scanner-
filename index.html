<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sniper Terminal</title>

<style>
body {
  background:#0f0f0f;
  color:white;
  font-family:sans-serif;
  padding:10px;
}

h1 {
  text-align:center;
  color:#19f5b3;
}

.card {
  background:#1c1c1c;
  padding:15px;
  border-radius:15px;
  margin-bottom:15px;
}

.item {
  background:#2a2a2a;
  padding:12px;
  border-radius:10px;
  margin-top:10px;
}

button {
  background:#19f5b3;
  border:none;
  padding:8px 12px;
  border-radius:8px;
  margin-top:8px;
  cursor:pointer;
}

.red { color:#ff4d4d }
.green { color:#00ffae }
.yellow { color:#ffd700 }
</style>
</head>

<body>

<h1>🚀 Sniper Terminal</h1>

<div class="card">
<h3>🔥 Trending</h3>
<div id="trending"></div>
</div>

<div class="card">
<h3>🐋 Whale Gems</h3>
<div id="whales"></div>
</div>

<div class="card">
<h3>🚨 Early Volume Spikes</h3>
<div id="spikes"></div>
</div>

<audio id="alertSound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>

// ✅ SERVICE WORKER FIX
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js")
      .then(() => console.log("✅ Service Worker Registered"))
      .catch(err => console.error("❌ SW failed:", err));
  });
}

// ==========================
// 🔥 FETCH DATA
// ==========================
async function fetchData(){
  let res = await fetch("https://api.dexscreener.com/latest/dex/tokens/eth");
  let data = await res.json();
  return data.pairs || [];
}

// ==========================
// 🔔 ALERT SYSTEM
// ==========================
function triggerAlert(){
  document.getElementById("alertSound").play();
  if (navigator.vibrate) navigator.vibrate(200);
}

// ==========================
// 🛑 ANTI RUG FILTER
// ==========================
function isSafe(p){
  return (
    p.liquidity?.usd > 30000 &&
    p.volume?.h24 > 50000 &&
    p.txns?.h24?.buys > p.txns?.h24?.sells
  );
}

// ==========================
// 💰 LINK BUILDER
// ==========================
function dexLink(p){
  return `https://dexscreener.com/${p.chainId}/${p.pairAddress}`;
}

// ==========================
// 🔥 TRENDING
// ==========================
async function fetchTrending(){
  let box = document.getElementById("trending");
  let pairs = await fetchData();

  let filtered = pairs.filter(p =>
    p.volume?.h24 > 200000 &&
    p.priceChange?.h24 > 5 &&
    isSafe(p)
  ).slice(0,5);

  box.innerHTML = filtered.map(p=>`
    <div class="item">
      <b>${p.baseToken.symbol}</b><br>
      Vol: $${Math.round(p.volume.h24)}<br>
      Change: ${p.priceChange.h24.toFixed(2)}%<br>
      <button onclick="window.open('${dexLink(p)}')">💰 Buy</button>
    </div>
  `).join("");
}

// ==========================
// 🐋 WHALES
// ==========================
async function fetchWhales(){
  let box = document.getElementById("whales");
  let pairs = await fetchData();

  let whales = pairs.filter(p =>
    p.volume?.h24 > 500000 &&
    Math.abs(p.priceChange?.h24 || 0) < 10 &&
    isSafe(p)
  ).slice(0,5);

  box.innerHTML = whales.map(p=>`
    <div class="item">
      <b>${p.baseToken.symbol}</b><br>
      Vol: $${Math.round(p.volume.h24)}<br>
      <span class="yellow">🐋 Accumulating</span><br>
      <button onclick="window.open('${dexLink(p)}')">💰 View</button>
    </div>
  `).join("");
}

// ==========================
// 🚨 SPIKE DETECTION
// ==========================
let lastSpikes = new Set();

async function fetchSpikes(){
  let box = document.getElementById("spikes");
  let pairs = await fetchData();

  let spikes = pairs.filter(p =>
    p.volume?.h24 > 150000 &&
    Math.abs(p.priceChange?.h24 || 0) < 8 &&
    p.txns?.h24?.buys > p.txns?.h24?.sells &&
    isSafe(p)
  );

  spikes = spikes.slice(0,6);

  // ALERT NEW TOKENS
  spikes.forEach(p=>{
    if(!lastSpikes.has(p.pairAddress)){
      triggerAlert();
      lastSpikes.add(p.pairAddress);
    }
  });

  box.innerHTML = spikes.map(p=>{
    let pressure = p.txns.h24.buys - p.txns.h24.sells;

    let tag =
      pressure > 200 ? "🚨 HEAVY ACCUMULATION" :
      pressure > 100 ? "🔥 BUILDING" :
      "👀 EARLY ENTRY";

    return `
    <div class="item">
      <b>${p.baseToken.symbol}</b><br>
      Vol: $${Math.round(p.volume.h24)}<br>
      Change: ${p.priceChange.h24.toFixed(2)}%<br>
      <span class="green">${tag}</span><br>
      <button onclick="window.open('${dexLink(p)}')">💰 Buy</button>
    </div>
    `;
  }).join("");
}

// ==========================
// ⏱ AUTO REFRESH
// ==========================
async function init(){
  await fetchTrending();
  await fetchWhales();
  await fetchSpikes();
}

init();

setInterval(()=>{
  fetchTrending();
  fetchWhales();
  fetchSpikes();
},20000);

</script>

</body>
</html>
