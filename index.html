<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNIPER PRO • Pump.fun</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white p-3">

<h1 class="text-xl font-bold mb-3">🚀 SNIPER PRO</h1>

<div class="flex gap-2 mb-3">
  <button onclick="toggleSound()" class="bg-gray-800 px-2 py-1 rounded">🔊 Sound</button>
  <button onclick="clearList()" class="bg-gray-800 px-2 py-1 rounded">Clear</button>
</div>

<div id="tokens" class="space-y-3"></div>

<audio id="alertSound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>

const API = "https://frontend-api.pump.fun/coins";
let soundOn = true;
let seen = new Set();

Notification.requestPermission();

// ================= FETCH =================
async function fetchTokens() {
  try {
    const res = await fetch(API);
    const data = await res.json();

    // remove junk tokens
    return data.filter(t =>
      t.symbol &&
      t.symbol.length < 10 &&
      t.usd_market_cap > 1000
    ).slice(0, 80);

  } catch (e) {
    console.log("API error");
    return [];
  }
}

// ================= ANALYSIS =================
function analyze(t) {

  let vol5 = t.volume_5m || 0;
  let vol1h = t.volume_1h || 1;

  let volumeSpike = vol5 / (vol1h / 12);

  let buyers = t.unique_wallet_5m || 0;

  let priceFlat = Math.abs(t.price_change_5m || 0) < 6;

  let safety =
    (t.top_10_holders_percentage || 50) < 35 &&
    (t.dev_wallet_percentage || 50) < 20 &&
    t.liquidity_locked === true;

  let score =
    (volumeSpike * 0.5) +
    (buyers * 0.25) +
    (priceFlat ? 1 : 0) +
    (safety ? 1 : 0);

  return { score, volumeSpike, buyers, priceFlat, safety };
}

// ================= ALERT =================
function triggerAlert(token) {

  if (soundOn) {
    document.getElementById("alertSound").play();
  }

  if (Notification.permission === "granted") {
    new Notification(`🚀 ${token.symbol} early momentum`);
  }
}

// ================= RENDER =================
function render(tokens) {

  const container = document.getElementById("tokens");

  tokens.forEach(t => {

    const a = analyze(t);

    // ONLY HIGH QUALITY SIGNALS
    if (a.score < 3.5) return;

    // avoid duplicates
    if (seen.has(t.mint)) return;
    seen.add(t.mint);

    triggerAlert(t);

    const el = document.createElement("div");

    el.className = "bg-gray-900 p-3 rounded border border-gray-700";

    el.innerHTML = `
      <div class="flex justify-between">
        <b class="text-lg">${t.symbol}</b>
        <span class="text-green-400">Score: ${a.score.toFixed(2)}</span>
      </div>

      <div class="text-xs mt-2 text-gray-300">
        MC: $${Math.round(t.usd_market_cap)} |
        Age: ${Math.round(t.age / 60)}m
      </div>

      <div class="mt-2 text-sm">
        📊 Vol Spike: ${a.volumeSpike.toFixed(2)}x <br>
        👥 Buyers: ${a.buyers} <br>
        📉 Flat: ${a.priceFlat ? "✅" : "❌"} <br>
        🛡️ Safe: ${a.safety ? "✅" : "❌"}
      </div>

      <div class="flex gap-3 mt-3">
        <a href="https://pump.fun/${t.mint}" target="_blank"
           class="text-blue-400 text-sm">Buy</a>

        <a href="https://dexscreener.com/solana/${t.mint}" target="_blank"
           class="text-yellow-400 text-sm">Chart</a>
      </div>
    `;

    container.prepend(el);

  });
}

// ================= LOOP =================
async function run() {
  const tokens = await fetchTokens();
  render(tokens);
}

// ================= CONTROLS =================
function toggleSound() {
  soundOn = !soundOn;
  alert("Sound: " + (soundOn ? "ON" : "OFF"));
}

function clearList() {
  document.getElementById("tokens").innerHTML = "";
  seen.clear();
}

// FAST REFRESH (REAL EDGE)
setInterval(run, 5000);
run();

</script>

</body>
</html>
