<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sniper Terminal</title>

<style>
body { background:#0f0f0f; color:white; font-family:sans-serif; padding:10px; }
h1 { text-align:center; color:#19f5b3; }

.card {
  background:#1c1c1c;
  padding:15px;
  border-radius:15px;
  margin-bottom:15px;
}

.item {
  background:#2a2a2a;
  padding:12px;
  border-radius:10px;
  margin-top:10px;
}

button {
  background:#19f5b3;
  border:none;
  padding:8px 12px;
  border-radius:8px;
  margin-top:8px;
}

.green { color:#00ffae }
.yellow { color:#ffd700 }
</style>
</head>

<body>

<h1>🚀 Sniper Terminal</h1>

<div class="card">
<h3>🔥 Trending</h3>
<div id="trending">Loading...</div>
</div>

<div class="card">
<h3>🐋 Whale Gems</h3>
<div id="whales">Loading...</div>
</div>

<div class="card">
<h3>🚨 Early Volume Spikes</h3>
<div id="spikes">Loading...</div>
</div>

<audio id="alertSound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>

// ✅ SERVICE WORKER
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(()=>{});
  });
}

// ==========================
// 🔥 FETCH (WORKING)
// ==========================
async function fetchData(){
  try {
    let res = await fetch("https://api.dexscreener.com/latest/dex/search/?q=usdt");
    let data = await res.json();
    return data.pairs || [];
  } catch {
    return [];
  }
}

// ==========================
// 🔔 ALERT
// ==========================
function alertUser(){
  document.getElementById("alertSound").play().catch(()=>{});
  if(navigator.vibrate) navigator.vibrate(200);
}

// ==========================
// 🛑 FILTER
// ==========================
function safe(p){
  return p.liquidity?.usd > 20000 && p.volume?.h24 > 30000;
}

// ==========================
// 🔗 LINK
// ==========================
function link(p){
  return `https://dexscreener.com/${p.chainId}/${p.pairAddress}`;
}

// ==========================
// 🔥 TRENDING
// ==========================
async function trending(){
  let el = document.getElementById("trending");
  let pairs = await fetchData();

  let list = pairs.filter(p =>
    p.priceChange?.h24 > 2 &&
    p.volume?.h24 > 100000 &&
    safe(p)
  ).slice(0,5);

  el.innerHTML = list.map(p=>`
    <div class="item">
      <b>${p.baseToken.symbol}</b><br>
      Vol: $${Math.round(p.volume.h24)}<br>
      Change: ${p.priceChange.h24.toFixed(2)}%<br>
      <button onclick="window.open('${link(p)}')">💰 Buy</button>
    </div>
  `).join("") || "No data";
}

// ==========================
// 🐋 WHALES
// ==========================
async function whales(){
  let el = document.getElementById("whales");
  let pairs = await fetchData();

  let list = pairs.filter(p =>
    p.volume?.h24 > 400000 &&
    Math.abs(p.priceChange?.h24 || 0) < 5 &&
    safe(p)
  ).slice(0,5);

  el.innerHTML = list.map(p=>`
    <div class="item">
      <b>${p.baseToken.symbol}</b><br>
      Vol: $${Math.round(p.volume.h24)}<br>
      <span class="yellow">🐋 Accumulating</span><br>
      <button onclick="window.open('${link(p)}')">View</button>
    </div>
  `).join("") || "No whales";
}

// ==========================
// 🚨 SPIKES
// ==========================
let seen = new Set();

async function spikes(){
  let el = document.getElementById("spikes");
  let pairs = await fetchData();

  let list = pairs.filter(p =>
    p.volume?.h24 > 120000 &&
    Math.abs(p.priceChange?.h24 || 0) < 6 &&
    safe(p)
  ).slice(0,6);

  list.forEach(p=>{
    if(!seen.has(p.pairAddress)){
      alertUser();
      seen.add(p.pairAddress);
    }
  });

  el.innerHTML = list.map(p=>`
    <div class="item">
      <b>${p.baseToken.symbol}</b><br>
      Vol: $${Math.round(p.volume.h24)}<br>
      Change: ${p.priceChange.h24.toFixed(2)}%<br>
      <span class="green">🚨 EARLY</span><br>
      <button onclick="window.open('${link(p)}')">💰 Buy</button>
    </div>
  `).join("") || "No spikes";
}

// ==========================
// 🚀 INIT
// ==========================
function run(){
  trending();
  whales();
  spikes();
}

run();
setInterval(run, 20000);

</script>

</body>
</html>
