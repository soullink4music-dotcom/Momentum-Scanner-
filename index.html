<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🚀 Sniper Terminal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  background:#0b0b0b;
  color:white;
  font-family:Arial;
  padding:15px;
}

h1 {
  color:#00ffa6;
  text-align:center;
}

.section {
  background:#1a1a1a;
  padding:15px;
  border-radius:12px;
  margin-top:15px;
}

.card {
  background:#222;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
}

button {
  background:#00ffa6;
  border:none;
  padding:8px 12px;
  border-radius:8px;
  margin-top:5px;
  cursor:pointer;
}

.alert {
  color:yellow;
  font-weight:bold;
}

.good { color:#00ffa6; }
.bad { color:red; }

</style>
</head>

<body>

<h1>🚀 Sniper Terminal</h1>

<div class="section">
<h2>🔥 Trending</h2>
<div id="trending"></div>
</div>

<div class="section">
<h2>🐋 Whale Gems</h2>
<div id="whales"></div>
</div>

<div class="section">
<h2>🚨 Volume Spikes</h2>
<div id="spikes"></div>
</div>

<script>

// ✅ SERVICE WORKER
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js")
      .then(() => console.log("✅ Service Worker Registered"))
      .catch(err => console.error("❌ SW failed:", err));
  });
}

// 🔊 ALERT SOUND
function playAlert(){
  let audio = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
  audio.play();
}

// 📊 FETCH DATA (MULTI SCAN)
async function fetchData(){
  let queries = ["eth","bnb","sol","usdt","pepe","doge"];
  let all = [];

  for (let q of queries){
    let res = await fetch(`https://api.dexscreener.com/latest/dex/search?q=${q}`);
    let data = await res.json();
    if(data.pairs) all = all.concat(data.pairs);
  }

  return all;
}

// 🛡️ ANTI RUG FILTER
function isSafe(p){
  return (
    p.liquidity?.usd > 50000 &&
    p.volume?.h24 > 100000 &&
    p.txns?.h24?.buys > p.txns?.h24?.sells &&
    Math.abs(p.priceChange?.h24) < 40
  );
}

// 🐋 WHALE DETECTION
function getWhales(pairs){
  return pairs.filter(p =>
    p.liquidity?.usd > 150000 &&
    p.volume?.h24 > 300000 &&
    p.txns?.h24?.buys > p.txns?.h24?.sells
  ).slice(0,10);
}

// 🚨 VOLUME SPIKE DETECTION
function getSpikes(pairs){
  return pairs.filter(p =>
    p.volume?.h1 > 0 &&
    (p.volume.h24 / p.volume.h1) > 8 &&   // spike ratio
    Math.abs(p.priceChange?.h24) < 15
  ).slice(0,10);
}

// 🔥 TRENDING
function getTrending(pairs){
  return pairs
    .sort((a,b)=>b.volume.h24 - a.volume.h24)
    .slice(0,10);
}

// 🧱 CARD UI
function createCard(p, extra=""){
  let link = p.url || "#";

  return `
  <div class="card">
    <b>${p.baseToken.symbol}</b><br>
    Vol: $${Math.round(p.volume.h24)}<br>
    Change: ${p.priceChange.h24}%<br>
    ${extra}<br>

    <a href="${link}" target="_blank">
      <button>💰 Buy</button>
    </a>
  </div>
  `;
}

// 🔄 MAIN LOOP
let lastAlerts = new Set();

async function load(){
  let pairs = await fetchData();

  // 🛡️ filter safe only
  pairs = pairs.filter(isSafe);

  let trending = getTrending(pairs);
  let whales = getWhales(pairs);
  let spikes = getSpikes(pairs);

  // UI
  document.getElementById("trending").innerHTML =
    trending.map(p => createCard(p)).join("");

  document.getElementById("whales").innerHTML =
    whales.map(p => createCard(p, "🐋 Accumulating")).join("");

  document.getElementById("spikes").innerHTML =
    spikes.map(p => createCard(p, "🚨 EARLY SPIKE")).join("");

  // 🔔 ALERT SYSTEM
  spikes.forEach(p=>{
    if(!lastAlerts.has(p.pairAddress)){
      playAlert();
      lastAlerts.add(p.pairAddress);
    }
  });
}

// ⏱️ AUTO REFRESH
load();
setInterval(load, 20000);

</script>

</body>
</html>
